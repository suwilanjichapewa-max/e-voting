{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Voting System</title>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link rel="stylesheet" href="{% static 'bower_components/bootstrap/dist/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'plugins/iCheck/all.css' %}">
    <link rel="stylesheet" href="{% static 'bower_components/font-awesome/css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/AdminLTE.min.css' %}">
    <link rel="stylesheet" href="{% static 'dist/css/skins/_all-skins.min.css' %}">
    <link rel="stylesheet" href="{% static 'toastr/toastr.min.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,600,700,300italic,400italic,600italic">
    <style>
        .mt20 { margin-top: 20px; }
        .title { font-size: 50px; }
        #candidate_list { margin-top: 20px; }
        #candidate_list ul { list-style-type: none; }
        #candidate_list ul li { margin: 0 30px 30px 0; vertical-align: top; }
        .clist { margin-left: 20px; }
        .cname { font-size: 25px; }
        .votelist { font-size: 17px; }
        .voter-header { background-color: #3c8dbc; color: white; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body class="hold-transition skin-blue">
    <div class="wrapper">
        <header class="main-header voter-header">
            <a href="#" class="logo">
                <b>E-Voting</b> System
            </a>
            <nav class="navbar navbar-static-top">
                <div class="navbar-custom-menu">
                    <ul class="nav navbar-nav">
                        <li>
                            <a href="{% url 'account_logout' %}">Logout <i class="fa fa-sign-out"></i></a>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>
        <div class="content-wrapper" style="margin-left: 0;">
            {% block content %}{% endblock content %}
        </div>
    </div>
    <script src="{% static 'bower_components/jquery/dist/jquery.min.js' %}"></script>
    <script src="{% static 'bower_components/bootstrap/dist/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'plugins/iCheck/icheck.min.js' %}"></script>
    <script src="{% static 'bower_components/datatables.net/js/jquery.dataTables.min.js' %}"></script>
    <script src="{% static 'bower_components/datatables.net-bs/js/dataTables.bootstrap.min.js' %}"></script>
    <script src="{% static 'bower_components/jquery-slimscroll/jquery.slimscroll.min.js' %}"></script>
    <script src="{% static 'bower_components/fastclick/lib/fastclick.js' %}"></script>
    <script src="{% static 'dist/js/adminlte.min.js' %}"></script>
    <script src="{% static 'toastr/toastr.min.js' %}"></script>
    <script>
        $(function () {
            $('#example1').DataTable();
            var bookTable = $('#booklist').DataTable({
                'paging': true, 'lengthChange': false, 'searching': true,
                'ordering': true, 'info': false, 'autoWidth': false
            });
            $('#searchBox').on('keyup', function() { bookTable.search(this.value).draw(); });
        });
    </script>
    {% if messages %}
        {% for message in messages %}
            <script>
                toastr.{{ message.tags }}('{{ message }}', '{{ message.tags|title }}');
            </script>
        {% endfor %}
    {% endif %}
    {% block custom_js %}{% endblock custom_js %}
    {% block modal %}{% endblock modal %}
</body>
</html>
